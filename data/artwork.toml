[[artwork]]
filename = "ch0map.png"
location = "Chapter 0 round art"
artist = "Evan Chen (Ibis Paint)"
description = """
This was the actual link-map we used for the virtual MOP's in 2020 and 2021.
When MOP was being held virtually, there were so many different platforms
we were using in different ways that I drew a little cartoon map in 2020
and put it in a Google Draw so it would be easier for people to find things.
Later on that map ended up becoming the basis of the MOSP Hunt.
"""

[[artwork]]
filename = "map.png"
location = "Chapter 1 round art"
artist = "Evan Chen (Ibis Paint)"
description = """
The distorted version of the actual link map,
presented in the story as a map of the alternate-world MOSP.
"""

[[artwork]]
filename = "bridge.png"
location = "K (Bridge)"
artist = "Isabella Quan"
description = """
During virtual MOP 2020 and 2021, "Bridge" was a real Discord server
joining MOP to other online communities like SPARC or USABO.
We chose it to represent the connection from Chapter 0 to Chapter 1 in the hunt.
"""

[[artwork]]
filename = "meeting.png"
location = "Meeting Steve"
artist = "Evan Chen and Isabella Quan"
description = """
The first meeting with Academic Director Steve.
We chose the name Steve for meta-thematic reasons,
after which it was suggested we should draw him as the Minecraft character.
"""

[[artwork]]
